<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMS Login - Inventory Management System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-logo">
            <h1>📦 IMS</h1>
            <p>Inventory Management System</p>
            <small>Airtel End-User Equipment Tracker</small>
            <small>NDNIKUMANA DERIC | BAMURANGE SARAH</small>
        </div>

        <div th:if="${param.error}" class="alert alert-danger">
            ❌ Invalid username or password. Please try again.
        </div>
        
        <div th:if="${param.logout}" class="alert alert-info">
            ✅ You have been successfully logged out.
        </div>

        <form th:action="@{/login}" method="post" class="login-form">
            <!-- This hidden input is required for CSRF protection -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter your username" required autofocus>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-full">🔐 Login to Dashboard</button>
        </form>
        <p class="">USERNAME: 24RP09739 <br> PASSWORD: 24rp06926</p>
        <p class="login-footer">© 2024 Airtel IMS | Secure System Access</p>
    </div>
</body>
</html>
