<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMS - Issue Asset</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="main-content">
        <div class="page-header">
            <h2>📤 Issue Asset to Employee</h2>
            <a th:href="@{/assignments}" class="btn btn-outline">← Back to List</a>
        </div>

        <div class="card form-card">
            <form th:action="@{/assignments/issue}" method="post" th:object="${assignment}">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Select Asset *</label>
                        <select name="assetId" required>
                            <option value="">-- Select Available Asset --</option>
                            <option th:each="a : ${availableAssets}"
                                    th:value="${a.id}"
                                    th:text="${a.assetTag + ' — ' + a.brand + ' ' + a.model + ' (' + a.deviceType + ')'}">
                            </option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Employee Name *</label>
                        <input type="text" th:field="*{assignedTo}" required placeholder="Full name of employee">
                    </div>
                    
                    <div class="form-group">
                        <label>Employee ID</label>
                        <input type="text" th:field="*{employeeId}" placeholder="Staff ID / Badge number">
                    </div>
                    
                    <div class="form-group">
                        <label>Department *</label>
                        <input type="text" th:field="*{department}" required placeholder="e.g., Finance, IT, Sales">
                    </div>
                    
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="text" th:field="*{phoneNumber}" placeholder="Contact number">
                    </div>
                    
                    <div class="form-group">
                        <label>Condition at Issue *</label>
                        <select th:field="*{conditionAtIssue}" required>
                            <option value="">-- Select Condition --</option>
                            <option value="NEW">✨ New</option>
                            <option value="GOOD">👍 Good</option>
                            <option value="FAIR">👌 Fair</option>
                            <option value="POOR">⚠️ Poor</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Expected Return Date</label>
                        <input type="date" th:field="*{expectedReturnDate}">
                    </div>
                </div>
                
                <div class="form-group full-width">
                    <label>Purpose of Use</label>
                    <textarea th:field="*{purposeOfUse}" placeholder="Why is this device being issued? (e.g., Project work, Daily operations, etc.)"></textarea>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">📤 Issue Asset</button>
                    <a th:href="@{/assignments}" class="btn btn-outline">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
